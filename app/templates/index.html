<!DOCTYPE html>
<html>

<head>

<title>Spam Mail Detector</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

<style>

body{
    font-family: Arial;
    background: linear-gradient(120deg,#30637d,#748c91);
    color:white;
    text-align:center;
    padding:40px;
}

/* MAIN PAGE CONTAINER */
.container{
    max-width:750px;
    margin:auto;
}

/* TEXT AREA */
textarea{
    width:100%;
    height:160px;
    padding:15px;
    font-size:16px;
    border-radius:10px;
    border:none;
}

/* BUTTON */
button{
    padding:12px 25px;
    font-size:16px;
    background:#9d9a98;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#7c6e5a;
}

/* RESULT BOX */
.result{
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
    padding:14px;
    border-radius:10px;
}

/* SPAM RESULT */
.spam{
    background:#f53f4e;
}

/* NOT SPAM RESULT */
.ham{
    background:#61dc67;
}

/* GRAPH SECTION */
.graph-section{
    margin-top:60px;
    background:rgba(193, 190, 190, 0.1);
    padding:25px;
    border-radius:12px;
}

/* GRAPH IMAGE */
.graph-section img{
    width:100%;
    max-width:550px;
}

/* DIVIDER */
.section-divider{
    margin:40px auto;
    width:80%;
    border-top:2px solid rgba(255,255,255,0.3);
}

/* FOOTER */
footer{
    margin-top:60px;
    font-size:14px;
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>📧 Spam Mail Detection (SVM)</h1>

<form method="POST">

<textarea name="email" placeholder="Paste email content here...">{{ email_text }}</textarea>

<br><br>

<button type="submit">Check Email</button>

</form>


{% if prediction %}

<div class="result {{ prediction_class }}">
Prediction: {{ prediction }}
</div>

{% endif %}


<div class="section-divider"></div>


<div class="graph-section">

<h2>SVM Spam vs Ham Decision Boundary</h2>

<img src="{{ url_for('static', filename='svm_plot.png') }}">

</div>

</div>


<footer>

<hr style="margin-top:40px">

<p>Built by <b>Revetha K</b></p>

<p>Machine Learning Project • Spam Detection using Support Vector Machine</p>

</footer>

</body>

</html>
